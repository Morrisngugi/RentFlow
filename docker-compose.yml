version: '3.8'

name: rentflow-dev

services:
  postgres:
    image: postgres:15-alpine3.20
    container_name: rentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rentflow_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rentflow_password_change_me}
      POSTGRES_DB: rentflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentflow_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        ENVIRONMENT: production
    container_name: rentflow-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rentflow_user
      DB_PASSWORD: ${DB_PASSWORD:-rentflow_password_change_me}
      DB_NAME: rentflow_db
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rentflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        ENVIRONMENT: production
        NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    container_name: rentflow-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - rentflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  rentflow-network:
    driver: bridge
