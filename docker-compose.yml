version: '3.8'

services:
  postgres:
    image: postgres:15-bookworm
    container_name: rentflow-postgres
    environment:
      POSTGRES_USER: rentflow_user
      POSTGRES_PASSWORD: rentflow_password_change_me
      POSTGRES_DB: rentflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentflow_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rentflow-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rentflow_user
      DB_PASSWORD: rentflow_password_change_me
      DB_NAME: rentflow_db
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - rentflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rentflow-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://backend:3001/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - rentflow-network

volumes:
  postgres_data:

networks:
  rentflow-network:
    driver: bridge
