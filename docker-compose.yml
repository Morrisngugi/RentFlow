services:
  postgres:
    image: postgres:15-alpine3.20
    container_name: rentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rentflow_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rentflow_password_change_me}
      POSTGRES_DB: rentflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentflow_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rentflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rentflow-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rentflow_user
      DB_PASSWORD: ${DB_PASSWORD:-rentflow_password_change_me}
      DB_NAME: rentflow_db
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rentflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rentflow-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rentflow-network

volumes:
  postgres_data:

networks:
  rentflow-network:
    driver: bridge
