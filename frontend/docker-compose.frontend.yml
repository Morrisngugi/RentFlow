version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentflow-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      BACKEND_URL: http://localhost:3001
    ports:
      - "3000:3000"
    networks:
      - rentflow-network

networks:
  rentflow-network:
    external: true
