<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a4d7a" rx="8"/>
  
  <!-- House Icon -->
  <g transform="translate(32, 32)">
    <!-- Roof -->
    <polygon points="0,-18 -18,0 18,0" fill="#50c878"/>
    
    <!-- House body -->
    <rect x="-14" y="0" width="28" height="18" fill="#ffffff"/>
    
    <!-- Door -->
    <rect x="-6" y="6" width="12" height="14" fill="#1a4d7a"/>
    <circle cx="4" cy="13" r="1.5" fill="#50c878"/>
    
    <!-- Windows -->
    <rect x="-12" y="2" width="6" height="6" fill="#1a4d7a"/>
    <line x1="-9" y1="2" x2="-9" y2="8" stroke="#50c878" stroke-width="0.5"/>
    <line x1="-12" y1="5" x2="-6" y2="5" stroke="#50c878" stroke-width="0.5"/>
    
    <rect x="6" y="2" width="6" height="6" fill="#1a4d7a"/>
    <line x1="9" y1="2" x2="9" y2="8" stroke="#50c878" stroke-width="0.5"/>
    <line x1="6" y1="5" x2="12" y2="5" stroke="#50c878" stroke-width="0.5"/>
  </g>
</svg>